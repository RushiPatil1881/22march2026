name: SonarQube Scan

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 🔍 SonarQube Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=my-project \
            -Dsonar.host.url=http://<YOUR_SERVER_IP>:9000 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
